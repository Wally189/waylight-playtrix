<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waylight-Playtrix | Opening Front Desk</title>
  <meta http-equiv="refresh" content="0; url=playtrix-console.html#overview" />
  <link rel="icon" href="Assets/img/irish-cross.svg" type="image/svg+xml" />
  <style>
    :root {
      --accent: #2d5fa8;
      --accent-dark: #1f3f73;
      --text: #1f2d3d;
      --muted: #5f7ea6;
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(45, 95, 168, 0.16);
      --shadow: 0 24px 56px rgba(31, 63, 115, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      color: var(--text);
      font-family: "Trebuchet MS", "Gill Sans", Calibri, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(143, 183, 223, 0.24), transparent 24%),
        radial-gradient(circle at top right, rgba(45, 95, 168, 0.16), transparent 24%),
        linear-gradient(180deg, #eef5fb, #dfeef8 58%, #f9fbfd);
    }
    .redirect-card {
      width: min(680px, calc(100% - 2rem));
      padding: 2rem 2.1rem;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: left;
    }
    .eyebrow {
      margin: 0;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .redirect-card h1 {
      margin: 0.2rem 0 0.8rem;
      color: var(--accent);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 5vw, 3rem);
      text-transform: uppercase;
    }
    .redirect-card p { margin: 0.6rem 0; }
    .muted { color: var(--muted); }
    .redirect-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 1.2rem; }
    .redirect-link {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.8rem 0.95rem;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      color: var(--text);
      font-weight: 800;
      text-decoration: none;
    }
    .redirect-link::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background-image: linear-gradient(110deg, transparent 0%, rgba(240, 218, 159, 0.72) 42%, transparent 64%);
      background-repeat: no-repeat;
      background-size: 0% 100%;
      background-position: 115% 0;
      mix-blend-mode: soft-light;
      opacity: 0;
      pointer-events: none;
      transition: background-size 220ms ease, opacity 170ms ease;
      z-index: 0;
    }
    .redirect-link:hover::before,
    .redirect-link:focus-visible::before {
      background-size: 240% 100%;
      background-position: -35% 0;
      opacity: 0.46;
      animation: redirect-link-shimmer 620ms ease-out 1;
    }
    .redirect-link.primary {
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      border-color: transparent;
      color: #fff;
    }
    @keyframes redirect-link-shimmer {
      from { background-position: 115% 0; }
      to { background-position: -35% 0; }
    }
  </style>
</head>
<body>
  <main class="redirect-card" aria-live="polite">
    <p class="eyebrow">Waylight-Playtrix</p>
    <h1>Opening Front Desk</h1>
    <p class="muted">Playtrix - the Business and Personal Console</p>
    <div class="redirect-actions">
      <a class="redirect-link primary" href="playtrix-console.html#overview">Open Front Desk</a>
      <a class="redirect-link" href="personal-console.html">Waylight Personal Console</a>
    </div>
    <noscript>
      <p class="muted">If the redirect does not run, use the Front Desk button above.</p>
    </noscript>
  </main>
  <script>
    window.location.replace('playtrix-console.html#overview');
  </script>
</body>
</html>
