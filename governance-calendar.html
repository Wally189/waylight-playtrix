<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waylight-Playtrix | Governance Calendar</title>
  <meta http-equiv="refresh" content="0; url=playtrix-focus.html?topic=governance-calendar" />
  <link rel="icon" href="Assets/img/irish-cross.svg" type="image/svg+xml" />
  <style>
    :root {
      --accent: #a36b6b;
      --ink: #2a2c33;
      --muted: #6f7481;
      --line: rgba(163, 107, 107, 0.16);
      --shadow: 0 22px 44px rgba(54, 63, 81, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      font-family: "Trebuchet MS", "Gill Sans", Calibri, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(760px 320px at 14% 10%, rgba(45,79,140,.05), transparent 60%),
        radial-gradient(720px 300px at 88% 12%, rgba(110,122,134,.06), transparent 62%),
        linear-gradient(180deg, #f9f8f5 0%, #f4f2ee 100%);
    }

    .redirect-card {
      width: min(720px, 100%);
      padding: 1.5rem 1.7rem;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: rgba(255,255,255,.92);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .redirect-card h1 {
      margin: 0.25rem 0 0.6rem;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--accent);
    }

    .redirect-card p {
      margin: 0 0 1rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .redirect-card a {
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <article class="redirect-card">
    <p class="eyebrow">Waylight-Playtrix</p>
    <h1>Governance Calendar</h1>
    <p>The Governance Calendar now opens as its own focused page so the timing spine can be reviewed without loading the wider governance stack.</p>
    <p><a href="playtrix-focus.html?topic=governance-calendar">Open the Governance Calendar</a></p>
  </article>
  <script>
    window.location.replace('playtrix-focus.html?topic=governance-calendar');
  </script>
</body>
</html>
