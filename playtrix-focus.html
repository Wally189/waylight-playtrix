<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waylight-Playtrix | Focus View</title>
  <link rel="icon" href="Assets/img/irish-cross.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="Assets/css/playtrix-kanban.css" />
  <link rel="stylesheet" href="Assets/css/playtrix-filofax.css" />
  <style>
    body { margin: 0; min-height: 100vh; }
    main.wrap { padding: 1.4rem 0 3rem; }
    #focusRoot { display: grid; gap: 1rem; }
    .focus-stack,
    .focus-two,
    .focus-three,
    .focus-action-grid { display: grid; gap: 1rem; }
    .focus-two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .focus-three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .focus-stack > *,
    .focus-two > *,
    .focus-three > * { min-width: 0; }
    .focus-page-intro { margin-top: 0; }
    .focus-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .focus-note-card {
      display: grid;
      gap: 0.75rem;
    }
    .focus-note-card h3,
    .focus-note-card h4,
    .workboard-shell h2,
    .workboard-shell h3 { margin: 0; }
    .focus-links-table td:last-child,
    .focus-links-table th:last-child { width: 100px; }
    .workboard-shell { display: grid; gap: 1rem; }
    .workboard-shell .planner-inline-form { margin-top: 0.9rem; }
    .workboard-board-card { min-height: 24rem; }
    .focus-chip-row {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
      margin-top: 0.85rem;
    }
    .focus-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.72rem;
      border-radius: 999px;
      border: 1px solid var(--wf-rule);
      background: rgba(255, 255, 255, 0.9);
      color: var(--wf-primary);
      font-size: 0.84rem;
      font-weight: 700;
    }
    @media (max-width: 980px) {
      .focus-two,
      .focus-three {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <div class="brand shell-brand">
        <div class="brand-head">
          <p class="eyebrow">Waylight-Playtrix</p>
          <h1 id="focusPageTitle">Waylight Business Console</h1>
          <p class="sub" id="focusPageSub">Focused working view.</p>
        </div>
        <div class="toggle-stack">
          <a class="shell-toggle" href="personal-console.html">Waylight Personal Console</a>
        </div>
      </div>
      <nav data-shell-nav aria-label="Waylight-Playtrix sections"></nav>
      <div class="utility-links" aria-label="Public properties">
        <a class="utility-link" href="https://www.waylight-atlantic.co.uk" target="_blank" rel="noopener">Waylight Atlantic</a>
        <a class="utility-link" href="https://www.alanwpgallagher.info" target="_blank" rel="noopener">AlanWP Gallagher</a>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div id="focusRoot"></div>

    <footer class="site-footer">
      <div class="footer-inner">
        <nav class="footer-nav" aria-label="Footer links">
          <a href="index.html" class="footer-btn">Home</a>
          <a href="sitemap.html" class="footer-btn">Sitemap</a>
          <a href="personal-console.html" class="footer-btn">Personal Console</a>
        </nav>
        <p class="footer-tagline">Simple systems for a digital world.</p>
        <div class="waylight-legal-block" data-waylight-legal>
          <p class="footer-meta"><span data-datetime>Loading date and time...</span></p>
          <p class="waylight-legal-links"><a href="gdpr.html">GDPR</a> | <a href="privacy.html">Privacy</a> | <a href="terms.html">Terms</a></p>
          <p class="waylight-legal-location">Bristol, United Kingdom</p>
          <p class="waylight-legal-copyright">&#169; 2026 <a href="https://www.waylight-atlantic.co.uk" target="_blank" rel="noopener">Waylight-Atlantic</a></p>
        </div>
      </div>
    </footer>
  </main>

  <script src="Assets/js/playtrix-storage.js"></script>
  <script src="Assets/js/playtrix-governance.js"></script>
  <script src="Assets/js/playtrix-common.js"></script>
  <script src="Assets/js/playtrix-focus-bootstrap.js"></script>
  <script src="Assets/js/playtrix-shell.js"></script>
  <script src="Assets/js/playtrix-kanban.js"></script>
  <script src="Assets/js/playtrix-organiser.js"></script>
</body>
</html>
